<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Tracker Pro</title>
<style>
:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--accent:#3b82f6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--border:#1f2937}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0b1220,#0f172a);color:var(--text);font-family:Inter,system-ui,Arial}
.container{max-width:1200px;margin:0 auto;padding:16px}
.header{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
h1{font-size:22px;margin:0}
input,select,button{background:#020617;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px}
button{cursor:pointer}
button.primary{background:var(--accent);border-color:var(--accent)}
button.ghost{background:transparent}
.row{display:flex;gap:8px;flex-wrap:wrap}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:12px 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px}
.stat b{font-size:20px}
.board{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.col{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px;min-height:120px}
.col h3{margin:4px 4px 8px;font-size:13px;color:var(--muted);display:flex;justify-content:space-between}
.card{background:#020617;border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;cursor:grab}
.card:hover{border-color:#334155}
.meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.badge{font-size:10px;padding:2px 6px;border-radius:999px}
.b-applied{background:#1e3a8a}
.b-interview{background:#7c2d12}
.b-offer{background:#14532d}
.b-rejected{background:#7f1d1d}
.b-ghosted{background:#334155}
.small{font-size:11px;color:var(--muted)}
.warn{color:var(--red);font-size:11px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border-bottom:1px solid var(--border);padding:8px;font-size:12px;text-align:left}
th{color:var(--muted);cursor:pointer}
.hidden{display:none}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal{width:560px;max-width:95vw;background:#020617;border:1px solid var(--border);border-radius:12px;padding:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid .full{grid-column:1/-1}
.footer{margin-top:12px;display:flex;justify-content:flex-end;gap:8px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:10px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px}
.kpi b{font-size:18px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Job Tracker</h1>
    <input id="q" placeholder="Search company, role, location" />
    <select id="fStatus"><option value="">All Status</option><option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Ghosted</option></select>
    <select id="fPriority"><option value="">All Priority</option><option>High</option><option>Medium</option><option>Low</option></select>
    <button class="primary" onclick="openModal()">+ Add</button>
    <button class="ghost" onclick="toggleView()">Toggle View</button>
    <button class="ghost" onclick="exportData()">Export</button>
    <input type="file" id="import" class="ghost" />
  </div>

  <div class="stats" id="stats"></div>

  <div id="board" class="board"></div>

  <table id="table" class="table hidden">
    <thead>
      <tr>
        <th onclick="setSort('company')">Company</th>
        <th onclick="setSort('role')">Role</th>
        <th>Location</th>
        <th onclick="setSort('status')">Status</th>
        <th>Priority</th>
        <th onclick="setSort('date')">Applied</th>
        <th>Days</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="kpis" id="kpis"></div>
</div>

<div class="modal-bg" id="mbg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="mtitle">Add Application</h3>
    <div class="grid">
      <input id="mCompany" placeholder="Company *" />
      <input id="mRole" placeholder="Role *" />
      <input id="mLocation" placeholder="Location" />
      <select id="mStatus"><option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Ghosted</option></select>
      <select id="mPriority"><option>High</option><option>Medium</option><option>Low</option></select>
      <input type="date" id="mDate" />
      <input id="mSalary" placeholder="Salary" />
      <input id="mLink" placeholder="Job link" class="full" />
      <textarea id="mNotes" placeholder="Notes" class="full"></textarea>
    </div>
    <div class="footer">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" id="msave" onclick="saveApp()">Save</button>
    </div>
  </div>
</div>

<script>
// ---------- CONFIG ----------
const API_URL = "https://sheetdb.io/api/v1/jl81lxv12oigl";

// ---------- State ----------
let apps = [];
let view = localStorage.getItem('view') || 'kanban';
let sortCol = 'date', sortDir = -1, editId = null;
const STATUSES = ['Applied','Interview','Offer','Rejected','Ghosted'];

// ---------- Utils ----------
const $ = id => document.getElementById(id);
const today = new Date(); today.setHours(0,0,0,0);
const daysAgo = d => d ? Math.floor((today - new Date(d)) / 86400000) : null;

// ---------- API ----------
async function loadApps(){
  const res = await fetch(API_URL);
  apps = await res.json();

  // convert id to number
  apps = apps.map(a => ({ ...a, id: Number(a.id) }));

  render();
}

// ---------- Filters ----------
function filtered(){
  const q = $('q').value.toLowerCase();
  const s = $('fStatus').value; const p = $('fPriority').value;
  return apps.filter(a=>{
    if(q && !(`${a.company} ${a.role} ${a.location||''}`.toLowerCase().includes(q))) return false;
    if(s && a.status!==s) return false;
    if(p && a.priority!==p) return false;
    return true;
  });
}

function sorted(arr){
  return [...arr].sort((a,b)=>{
    let av=a[sortCol]||'', bv=b[sortCol]||'';
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
}

function setSort(c){ if(sortCol===c) sortDir*=-1; else { sortCol=c; sortDir=1;} render(); }

// ---------- Render ----------
function renderStats(){
  const total=apps.length;
  const applied=apps.filter(a=>a.status==='Applied').length;
  const interview=apps.filter(a=>a.status==='Interview').length;
  const offer=apps.filter(a=>a.status==='Offer').length;
  const rejected=apps.filter(a=>a.status==='Rejected').length;
  $('stats').innerHTML = `
    <div class="stat"><div class="small">Total</div><b>${total}</b></div>
    <div class="stat"><div class="small">Applied</div><b>${applied}</b></div>
    <div class="stat"><div class="small">Interview</div><b style="color:var(--amber)">${interview}</b></div>
    <div class="stat"><div class="small">Offers</div><b style="color:var(--green)">${offer}</b></div>
    <div class="stat"><div class="small">Rejected</div><b style="color:var(--red)">${rejected}</b></div>`;
}

function renderKPIs(){
  const applied=apps.filter(a=>a.status==='Applied').length || 1;
  const interview=apps.filter(a=>a.status==='Interview').length;
  const offer=apps.filter(a=>a.status==='Offer').length;
  const toInt = Math.round((interview/applied)*100);
  const toOffer = Math.round((offer/Math.max(1,interview))*100);
  const avgDays = Math.round((apps.map(a=>daysAgo(a.date)||0).reduce((x,y)=>x+y,0))/Math.max(1,apps.length));
  $('kpis').innerHTML = `
    <div class="kpi"><div class="small">Applied → Interview</div><b>${toInt}%</b></div>
    <div class="kpi"><div class="small">Interview → Offer</div><b>${toOffer}%</b></div>
    <div class="kpi"><div class="small">Avg Days Since Apply</div><b>${avgDays}</b></div>`;
}

function renderBoard(){
  const f = sorted(filtered());
  $('board').innerHTML = STATUSES.map(s=>{
    const list = f.filter(a=>a.status===s);
    return `
      <div class="col" ondragover="event.preventDefault()" ondrop="drop(event,'${s}')">
        <h3>${s} <span>${list.length}</span></h3>
        ${list.map(a=>{
          const d = daysAgo(a.date);
          const warn = d!==null && d>7 && a.status==='Applied' ? '<div class="warn">Follow up</div>' : '';
          return `
            <div class="card" draggable="true" ondragstart="dragStart(event,${a.id})" onclick="openModal(${a.id})">
              <div><b>${a.company}</b></div>
              <div class="small">${a.role}</div>
              <div class="meta">
                <span class="badge b-${a.status.toLowerCase()}">${a.status}</span>
                <span class="small">${d===null?'—':(d===0?'today':d+'d')}</span>
              </div>
              ${warn}
            </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

function renderTable(){
  const rows = sorted(filtered());
  $('tbody').innerHTML = rows.map(a=>{
    const d = daysAgo(a.date);
    return `<tr>
      <td>${a.company}</td>
      <td>${a.role}</td>
      <td>${a.location||''}</td>
      <td>${a.status}</td>
      <td>${a.priority||''}</td>
      <td>${a.date||''}</td>
      <td>${d===null?'—':(d===0?'today':d+'d')}</td>
      <td><button onclick="openModal(${a.id})">Edit</button> <button onclick="remove(${a.id})">✕</button></td>
    </tr>`;
  }).join('');
}

function render(){
  renderStats(); renderKPIs();
  if(view==='kanban'){ $('board').classList.remove('hidden'); $('table').classList.add('hidden'); renderBoard(); }
  else { $('board').classList.add('hidden'); $('table').classList.remove('hidden'); renderTable(); }
}

// ---------- DnD ----------
function dragStart(e,id){ e.dataTransfer.setData('id', id); }

async function drop(e,status){
  const id = Number(e.dataTransfer.getData('id'));

  await fetch(`${API_URL}/id/${id}`, {
    method:"PATCH",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ data: { status } })
  });

  loadApps();
}

// ---------- CRUD ----------
function openModal(id){
  editId = id || null;
  const a = apps.find(x=>x.id===id) || {};

  $('mCompany').value = a.company||''; 
  $('mRole').value = a.role||''; 
  $('mLocation').value = a.location||'';
  $('mStatus').value = a.status||'Applied'; 
  $('mPriority').value = a.priority||'High'; 
  $('mDate').value = a.date||'';
  $('mSalary').value = a.salary||''; 
  $('mLink').value = a.link||''; 
  $('mNotes').value = a.notes||'';

  $('mbg').style.display='flex';
}

function closeModal(){ $('mbg').style.display='none'; }

async function saveApp(){
  const company=$('mCompany').value.trim(), role=$('mRole').value.trim();
  if(!company||!role){ alert('Company and Role required'); return; }

  const data={
    id: editId || Date.now(),
    company, role,
    location:$('mLocation').value.trim(),
    status:$('mStatus').value,
    priority:$('mPriority').value,
    date:$('mDate').value,
    salary:$('mSalary').value.trim(),
    link:$('mLink').value.trim(),
    notes:$('mNotes').value.trim()
  };

  if(editId){
    await fetch(`${API_URL}/id/${editId}`, {
      method:"PATCH",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ data })
    });
  } else {
    await fetch(API_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ data })
    });
  }

  closeModal();
  loadApps();
}

async function remove(id){
  if(!confirm('Delete this item?')) return;

  await fetch(`${API_URL}/id/${id}`, { method:"DELETE" });

  loadApps();
}

// ---------- View ----------
function toggleView(){ view = view==='kanban'?'table':'kanban'; localStorage.setItem('view', view); render(); }

// ---------- Init ----------
['q','fStatus','fPriority'].forEach(id=> $(id).addEventListener('input', render));
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); if(e.key==='n') openModal(); });

// START
loadApps();
</script>
</body>
</html>
