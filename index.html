<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Tracker Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b1120;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1f2d42;
  --border2: #2a3d56;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #4e6280;
  --accent: #3b82f6;
  --accent-dim: #1d3a6e;
  --green: #22c55e;
  --green-dim: #14532d;
  --amber: #f59e0b;
  --amber-dim: #78350f;
  --red: #ef4444;
  --red-dim: #7f1d1d;
  --gray-dim: #1e293b;
  --radius: 10px;
  --radius-sm: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 10px; height: 54px; position: sticky; top: 0; z-index: 50; flex-wrap: wrap; }
.logo { font-size: 15px; font-weight: 600; letter-spacing: -.3px; white-space: nowrap; color: var(--text); }
.logo span { color: var(--accent); }
.header-sep { width: 1px; height: 20px; background: var(--border); }
.search-wrap { position: relative; }
.search-wrap input { padding: 6px 10px 6px 30px; width: 220px; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none; }
.header-spacer { flex: 1; }
.view-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.view-btn { padding: 5px 13px; border: none; background: transparent; color: var(--text2); font-family: inherit; font-size: 12px; cursor: pointer; transition: all .15s; font-weight: 500; }
.view-btn.active { background: var(--accent); color: #fff; }

/* Controls */
input, select, textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; outline: none; transition: border-color .15s; }
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
input::placeholder { color: var(--text3); }
select option { background: var(--surface2); }

.btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text); font-family: inherit; font-size: 12px; cursor: pointer; font-weight: 500; transition: all .15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
.btn:hover { background: var(--surface2); border-color: var(--border2); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #2563eb; border-color: #2563eb; }
.btn-danger { color: var(--red); border-color: #7f1d1d; }
.btn-danger:hover { background: var(--red-dim); }
.btn-sm { padding: 4px 9px; font-size: 11px; }

/* Main */
.main { max-width: 1260px; margin: 0 auto; padding: 1.25rem 1.5rem; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 1.25rem; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; }
.stat-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
.stat-val { font-size: 24px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.stat-val.blue { color: var(--accent); }
.stat-val.green { color: var(--green); }
.stat-val.amber { color: var(--amber); }
.stat-val.red { color: var(--red); }

/* Toolbar */
.toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
.toolbar select { padding: 6px 8px; }
.toolbar-spacer { flex: 1; }
.kbd { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: var(--text3); }
.kbd kbd { background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; padding: 1px 5px; font-family: 'JetBrains Mono', monospace; font-size: 10px; }

/* Kanban */
.board { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; align-items: start; }
.k-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .15s; }
.k-col.drag-over { border-color: var(--accent); }
.k-col-head { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.k-col-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.k-col-count { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 99px; font-family: 'JetBrains Mono', monospace; }
.k-col-body { padding: 8px; min-height: 80px; display: flex; flex-direction: column; gap: 6px; }
.k-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; cursor: grab; transition: border-color .15s, transform .1s; }
.k-card:active { cursor: grabbing; }
.k-card:hover { border-color: var(--border2); }
.k-card.dragging { opacity: .4; transform: scale(.97); }
.k-card-co { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.k-card-role { font-size: 11px; color: var(--text2); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.k-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.k-card-days { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--text3); }
.k-card-days.warn { color: var(--amber); }
.k-card-actions { display: flex; gap: 3px; opacity: 0; transition: opacity .15s; }
.k-card:hover .k-card-actions { opacity: 1; }
.icon-btn { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text2); font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.icon-btn:hover { background: var(--bg); color: var(--text); }
.icon-btn.del:hover { color: var(--red); border-color: var(--red-dim); background: var(--red-dim); }
.k-empty { font-size: 11px; color: var(--text3); text-align: center; padding: 14px 8px; }

/* Table */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
thead { background: var(--surface2); }
th { padding: 9px 12px; text-align: left; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
th:hover { color: var(--text2); }
td { padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--surface2); }
.td-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); }

/* Badges */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
.b-applied     { background: var(--accent-dim); color: #93c5fd; }
.b-screening  { background: #312e81;             color: #c4b5fd; }
.b-interview   { background: var(--amber-dim);  color: #fcd34d; }
.b-offer       { background: var(--green-dim);   color: #86efac; }
.b-rejected    { background: var(--red-dim);     color: #fca5a5; }
.b-ghosted     { background: var(--gray-dim);    color: var(--text2); }
.b-high        { background: var(--red-dim);     color: #fca5a5; }
.b-medium      { background: var(--amber-dim);   color: #fcd34d; }
.b-low         { background: var(--green-dim);   color: #86efac; }

/* KPIs */
.kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 1.25rem; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; }
.kpi-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
.kpi-val { font-size: 22px; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
.kpi-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 560px; max-width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(14px) scale(.98); transition: transform .2s; }
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-head { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 14px; font-weight: 600; }
.modal-close { width: 26px; height: 26px; border: none; background: transparent; color: var(--text2); font-size: 14px; cursor: pointer; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; transition: all .15s; }
.modal-close:hover { background: var(--surface2); color: var(--text); }
.modal-body { padding: 16px 18px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.form-group input, .form-group select, .form-group textarea { padding: 7px 10px; width: 100%; }
.form-group textarea { resize: vertical; min-height: 64px; }
.modal-foot { padding: 12px 18px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

/* Loading */
.loading { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; gap: 14px; transition: opacity .3s; }
.loading.done { opacity: 0; pointer-events: none; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
.loading-text { font-size: 13px; color: var(--text2); }
@keyframes spin { to { transform: rotate(360deg); } }

/* Inline spinner for buttons */
.btn-spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
.btn.loading .btn-spinner { display: inline-block; }
.btn.loading .btn-text { opacity: .5; }

/* Toast */
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 16px; font-size: 13px; font-weight: 500; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,.4); transform: translateY(60px); opacity: 0; transition: all .25s; display: flex; align-items: center; gap: 8px; max-width: 320px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success .toast-icon { color: var(--green); }
.toast.error .toast-icon { color: var(--red); }
.toast.info .toast-icon { color: var(--accent); }

/* Error banner */
.error-banner { background: var(--red-dim); border: 1px solid #7f1d1d; border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 1rem; font-size: 12px; color: #fca5a5; display: flex; align-items: center; gap: 8px; }

/* Offline badge */
.offline-badge { font-size: 11px; background: var(--amber-dim); color: var(--amber); padding: 3px 8px; border-radius: 99px; font-weight: 500; display: none; }
.offline-badge.show { display: inline-flex; }

/* Empty state */
.empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 13px; }

/* Confirm dialog */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 150; opacity: 0; pointer-events: none; transition: opacity .15s; }
.confirm-overlay.open { opacity: 1; pointer-events: all; }
.confirm-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 320px; }
.confirm-box p { color: var(--text2); font-size: 13px; margin-top: 6px; margin-bottom: 16px; }
.confirm-box h4 { font-size: 14px; }
.confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* JD Drawer */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 90; opacity: 0; pointer-events: none; transition: opacity .25s; }
.drawer-overlay.open { opacity: 1; pointer-events: all; }
.drawer { position: fixed; top: 0; right: 0; height: 100vh; width: 480px; max-width: 95vw; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 91; transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1); box-shadow: -8px 0 32px rgba(0,0,0,.4); }
.drawer-overlay.open .drawer { transform: translateX(0); }
.drawer-head { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0; }
.drawer-head-info { flex: 1; min-width: 0; }
.drawer-company { font-size: 16px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.drawer-role { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.drawer-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.drawer-close { width: 28px; height: 28px; border: none; background: transparent; color: var(--text2); font-size: 16px; cursor: pointer; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
.drawer-close:hover { background: var(--surface2); color: var(--text); }
.drawer-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.drawer-tab { flex: 1; padding: 9px; border: none; background: transparent; color: var(--text2); font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; }
.drawer-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 18px; }
.drawer-section { margin-bottom: 18px; }
.drawer-section-title { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.drawer-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.drawer-row:last-child { border-bottom: none; }
.drawer-row-label { font-size: 11px; color: var(--text3); flex-shrink: 0; padding-top: 1px; }
.drawer-row-val { font-size: 12px; color: var(--text); text-align: right; word-break: break-word; }
.drawer-row-val a { color: var(--accent); text-decoration: none; }
.drawer-row-val a:hover { text-decoration: underline; }
.drawer-notes { font-size: 12px; color: var(--text2); line-height: 1.6; white-space: pre-wrap; word-break: break-word; background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
.drawer-jd { font-size: 12px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; word-break: break-word; font-family: inherit; }
.drawer-jd-empty { font-size: 12px; color: var(--text3); text-align: center; padding: 2rem 1rem; }
.drawer-jd-wrap { position: relative; }
.drawer-jd-edit { width: 100%; min-height: 300px; font-size: 12px; line-height: 1.7; padding: 10px 12px; resize: vertical; color: var(--text); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; outline: none; transition: border-color .15s; }
.drawer-jd-edit:focus { border-color: var(--accent); }
.drawer-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
.jd-indicator { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; margin-left: 4px; vertical-align: middle; }

@media (max-width: 900px) {
  .stats { grid-template-columns: repeat(3, 1fr); }
  .board { grid-template-columns: repeat(2, 1fr); }
  .main { padding: 1rem; }
  .header { padding: 0 1rem; height: auto; padding: 8px 1rem; }
}
@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .board { grid-template-columns: 1fr; }
  .kpis { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: 1; }
  .search-wrap input { width: 160px; }
}
</style>
</head>
<body>

<!-- Loading screen -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading applications…</div>
</div>

<!-- Header -->
<header class="header">
  <div class="logo">Job<span>Tracker</span> <span style="font-size:10px;color:var(--text3);font-weight:400">Pro</span></div>
  <div class="header-sep"></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="q" placeholder="Search…" oninput="render()" style="padding:6px 10px 6px 28px;width:200px">
  </div>
  <span class="offline-badge" id="offline-badge">⚡ Offline</span>
  <div class="header-spacer"></div>
  <span class="kbd"><kbd>N</kbd> new &nbsp; <kbd>Esc</kbd> close</span>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-kanban" onclick="setView('kanban')">⊞ Kanban</button>
    <button class="view-btn" id="btn-table" onclick="setView('table')">≡ List</button>
  </div>
  <button class="btn btn-primary" onclick="openModal()">+ Add</button>
</header>

<main class="main">
  <div id="error-banner" style="display:none" class="error-banner">⚠ <span id="error-msg"></span></div>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <select id="fStatus" onchange="render()" style="padding:6px 8px">
      <option value="">All Statuses</option>
      <option>Applied</option><option>Screening</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Ghosted</option>
    </select>
    <select id="fPriority" onchange="render()" style="padding:6px 8px">
      <option value="">All Priorities</option>
      <option>High</option><option>Medium</option><option>Low</option>
    </select>
    <div class="toolbar-spacer"></div>
    <label class="btn" style="cursor:pointer">
      ↑ Import CSV
      <input type="file" id="import-input" accept=".csv" style="display:none" onchange="importCSV(event)">
    </label>
    <button class="btn" onclick="exportCSV()">↓ Export CSV</button>
  </div>

  <!-- Views -->
  <div id="view-kanban"></div>
  <div id="view-table" style="display:none"></div>

  <!-- KPIs -->
  <div class="kpis" id="kpis"></div>
</main>

<!-- Add / Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Add Application</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Company *</label><input id="f-company" placeholder="e.g. Google"></div>
        <div class="form-group"><label>Role *</label><input id="f-role" placeholder="e.g. Software Engineer"></div>
        <div class="form-group"><label>Location</label><input id="f-location" placeholder="e.g. Remote"></div>
        <div class="form-group"><label>Job Type</label>
          <select id="f-type"><option>Full-time</option><option>Part-time</option><option>Internship</option><option>Contract</option></select>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="f-status"><option>Applied</option><option>Screening</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Ghosted</option></select>
        </div>
        <div class="form-group"><label>Priority</label>
          <select id="f-priority"><option>High</option><option>Medium</option><option>Low</option></select>
        </div>
        <div class="form-group"><label>Source</label>
          <select id="f-source"><option>LinkedIn</option><option>Referral</option><option>Company Website</option><option>Indeed</option><option>Glassdoor</option><option>Other</option></select>
        </div>
        <div class="form-group"><label>Date Applied</label><input type="date" id="f-date"></div>
        <div class="form-group"><label>Salary Range</label><input id="f-salary" placeholder="e.g. $120k–$150k"></div>
        <div class="form-group"><label>Follow-up Date</label><input type="date" id="f-followup"></div>
        <div class="form-group"><label>Contact Name</label><input id="f-contact" placeholder="Jane Doe"></div>
        <div class="form-group"><label>Contact Email</label><input id="f-email" type="email" placeholder="jane@co.com"></div>
        <div class="form-group full"><label>Job Link</label><input id="f-link" placeholder="https://…"></div>
        <div class="form-group full"><label>Notes</label><textarea id="f-notes" placeholder="Any notes…"></textarea></div>
        <div class="form-group full"><label>Job Description</label><textarea id="f-jd" placeholder="Paste the full job description here…" style="min-height:120px"></textarea></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveApp()">
        <div class="btn-spinner"></div>
        <span class="btn-text">Save Application</span>
      </button>
    </div>
  </div>
</div>

<!-- JD Drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="if(event.target===this)closeDrawer()">
  <div class="drawer">
    <div class="drawer-head">
      <div class="drawer-head-info">
        <div class="drawer-company" id="dr-company">—</div>
        <div class="drawer-role" id="dr-role">—</div>
        <div class="drawer-badges" id="dr-badges"></div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-tabs">
      <button class="drawer-tab active" id="dtab-details" onclick="setDrawerTab('details')">Details</button>
      <button class="drawer-tab" id="dtab-jd" onclick="setDrawerTab('jd')">Job Description</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-foot" id="drawer-foot" style="display:none">
      <button class="btn" onclick="cancelJDEdit()">Cancel</button>
      <button class="btn btn-primary" id="save-jd-btn" onclick="saveJD()">
        <div class="btn-spinner"></div>
        <span class="btn-text">Save JD</span>
      </button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h4>Delete Application</h4>
    <p>Are you sure? This cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon"></span>
  <span id="toast-msg"></span>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const API_URL = "https://sheetdb.io/api/v1/jl81lxv12oigl";
const STATUSES = ['Applied','Screening','Interview','Offer','Rejected','Ghosted'];
const FIELDS   = ['company','role','location','type','status','priority','source','date','salary','followup','contact','email','link','notes','jd'];
// Verify FIELDS matches your SheetDB column headers exactly ↑

// ─── STATE ───────────────────────────────────────────────────────────────────
let apps = [], view = localStorage.getItem('jt_view') || 'kanban';
let sortCol = 'date', sortDir = -1, editId = null;
let dragId = null, confirmCallback = null;

// ─── UTILS ───────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const today = new Date(); today.setHours(0,0,0,0);
const daysAgo = d => d ? Math.floor((today - new Date(d)) / 86400000) : null;
const daysLabel = d => {
  const n = daysAgo(d);
  if (n === null) return '—';
  if (n < 0) return 'upcoming';
  if (n === 0) return 'today';
  return n + 'd ago';
};
const statusKey = s => (s||'').toLowerCase();
const colStyle = s => ({
  Applied:   {title:'Applied',    color:'#93c5fd', bg:'#1d3a6e', cnt:'#1e40af'},
  Screening: {title:'Screening',  color:'#c4b5fd', bg:'#312e81', cnt:'#4338ca'},
  Interview: {title:'Interview',  color:'#fcd34d', bg:'#78350f', cnt:'#92400e'},
  Offer:     {title:'Offer',      color:'#86efac', bg:'#14532d', cnt:'#166534'},
  Rejected:  {title:'Rejected',   color:'#fca5a5', bg:'#7f1d1d', cnt:'#991b1b'},
  Ghosted:   {title:'Ghosted',    color:'#94a3b8', bg:'#1e293b', cnt:'#334155'},
}[s] || {title:s, color:'#94a3b8', bg:'#1e293b', cnt:'#334155'});

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'success') {
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const el = $('toast');
  el.className = `toast ${type}`;
  $('toast-icon').textContent = icons[type] || '✓';
  $('toast-msg').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ─── ERROR BANNER ────────────────────────────────────────────────────────────
function showError(msg) {
  $('error-banner').style.display = 'flex';
  $('error-msg').textContent = msg;
}
function clearError() { $('error-banner').style.display = 'none'; }

// ─── OFFLINE ─────────────────────────────────────────────────────────────────
window.addEventListener('online',  () => { $('offline-badge').classList.remove('show'); loadApps(); });
window.addEventListener('offline', () => $('offline-badge').classList.add('show'));

// ─── API ─────────────────────────────────────────────────────────────────────
async function api(method, path = '', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_URL + path, opts);
  if (!res.ok) throw new Error(`API ${res.status}: ${res.statusText}`);
  return res.json();
}

async function loadApps() {
  clearError();
  try {
    const data = await api('GET');
    apps = data.map(a => ({ ...a, id: Number(a.id) || a.id }));
    render();
  } catch(e) {
    showError('Could not load from SheetDB. Check your API URL or network. Showing cached data.');
    toast('Failed to load — check API config', 'error');
    // Graceful fallback: if apps is already populated keep it
  } finally {
    const ld = $('loading');
    ld.classList.add('done');
    setTimeout(() => ld.style.display = 'none', 350);
  }
}

// ─── FILTERS / SORT ──────────────────────────────────────────────────────────
function filtered() {
  const q  = $('q').value.toLowerCase();
  const st = $('fStatus').value;
  const pr = $('fPriority').value;
  return apps.filter(a => {
    if (q && !`${a.company} ${a.role} ${a.location||''}`.toLowerCase().includes(q)) return false;
    if (st && a.status !== st) return false;
    if (pr && a.priority !== pr) return false;
    return true;
  });
}

function sorted(arr) {
  return [...arr].sort((a, b) => {
    const av = a[sortCol] || '', bv = b[sortCol] || '';
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

function setSort(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  render();
}

// ─── BADGES ──────────────────────────────────────────────────────────────────
function statusBadge(s) {
  return `<span class="badge b-${statusKey(s)}">${s}</span>`;
}
function priorityBadge(p) {
  const k = (p||'low').toLowerCase();
  return `<span class="badge b-${k}">${p}</span>`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderStats() {
  const counts = { total: apps.length, applied: 0, screening: 0, interview: 0, offer: 0, rejected: 0 };
  apps.forEach(a => {
    if (a.status === 'Applied') counts.applied++;
    else if (a.status === 'Screening') counts.screening++;
    else if (a.status === 'Interview') counts.interview++;
    else if (a.status === 'Offer') counts.offer++;
    else if (a.status === 'Rejected') counts.rejected++;
  });
  $('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val blue">${counts.total}</div></div>
    <div class="stat"><div class="stat-label">Applied</div><div class="stat-val">${counts.applied}</div></div>
    <div class="stat"><div class="stat-label">Screening</div><div class="stat-val" style="color:#c4b5fd">${counts.screening}</div></div>
    <div class="stat"><div class="stat-label">Interview</div><div class="stat-val amber">${counts.interview}</div></div>
    <div class="stat"><div class="stat-label">Offers</div><div class="stat-val green">${counts.offer}</div></div>
    <div class="stat"><div class="stat-label">Rejected</div><div class="stat-val red">${counts.rejected}</div></div>`;
}

function renderKPIs() {
  const interview = apps.filter(a => a.status === 'Interview').length;
  const offer     = apps.filter(a => a.status === 'Offer').length;
  const applied   = apps.filter(a => a.status === 'Applied').length;
  const total     = apps.length || 1;
  const toInt     = Math.round((interview / Math.max(1, applied + interview)) * 100);
  const toOffer   = Math.round((offer / Math.max(1, interview)) * 100);
  const avgDays   = Math.round(apps.reduce((s, a) => s + (daysAgo(a.date) || 0), 0) / total);
  $('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-label">Applied → Interview Rate</div><div class="kpi-val">${toInt}%</div><div class="kpi-sub">${interview} interview${interview!==1?'s':''} from ${applied+interview} apps</div></div>
    <div class="kpi"><div class="kpi-label">Interview → Offer Rate</div><div class="kpi-val">${toOffer}%</div><div class="kpi-sub">${offer} offer${offer!==1?'s':''} from ${interview} interview${interview!==1?'s':''}</div></div>
    <div class="kpi"><div class="kpi-label">Avg Days Since Applied</div><div class="kpi-val">${avgDays}</div><div class="kpi-sub">across ${total} application${total!==1?'s':''}</div></div>`;
}

function renderKanban() {
  const f = sorted(filtered());
  $('view-kanban').innerHTML = `<div class="board">${
    STATUSES.map(s => {
      const cards = f.filter(a => a.status === s);
      const c = colStyle(s);
      return `<div class="k-col" id="col-${s}"
          ondragover="dragOver(event,'${s}')"
          ondragleave="dragLeave('${s}')"
          ondrop="drop(event,'${s}')">
        <div class="k-col-head" style="background:${c.bg}20;border-bottom-color:${c.bg}">
          <span class="k-col-title" style="color:${c.color}">${c.title}</span>
          <span class="k-col-count" style="background:${c.cnt};color:${c.color}">${cards.length}</span>
        </div>
        <div class="k-col-body">
          ${cards.length ? cards.map(a => {
            const d = daysAgo(a.date);
            const warnClass = d !== null && d > 7 && a.status === 'Applied' ? ' warn' : '';
            return `<div class="k-card" draggable="true"
                ondragstart="dragStart(event,${a.id})"
                ondragend="dragEnd()">
              <div class="k-card-co">${a.company}</div>
              <div class="k-card-role">${a.role}</div>
              <div class="k-card-foot">
                ${priorityBadge(a.priority||'Low')}
                <div style="display:flex;align-items:center;gap:6px">
                  <span class="k-card-days${warnClass}">${daysLabel(a.date)}${warnClass?' ⚠':''}</span>
                  <div class="k-card-actions">
                    <button class="icon-btn" onclick="openDrawer(${a.id})" title="View details">◱</button>
                    <button class="icon-btn" onclick="openModal(${a.id})" title="Edit">✎</button>
                    <button class="icon-btn del" onclick="confirmDelete(${a.id})" title="Delete">✕</button>
                  </div>
                </div>
              </div>
            </div>`;
          }).join('') : `<div class="k-empty">Drop cards here</div>`}
        </div>
      </div>`;
    }).join('')
  }</div>`;
}

function renderTable() {
  const rows = sorted(filtered());
  const si = col => sortCol === col ? (sortDir === 1 ? ' ↑' : ' ↓') : ' ↕';
  if (!rows.length) {
    $('view-table').innerHTML = '<div class="empty">No applications match your filters.</div>';
    return;
  }
  $('view-table').innerHTML = `<div class="table-wrap"><table>
    <thead><tr>
      <th style="width:130px" onclick="setSort('company')">Company${si('company')}</th>
      <th style="width:140px" onclick="setSort('role')">Role${si('role')}</th>
      <th style="width:100px">Location</th>
      <th style="width:90px"  onclick="setSort('status')">Status${si('status')}</th>
      <th style="width:72px">Priority</th>
      <th style="width:94px"  onclick="setSort('date')">Applied${si('date')}</th>
      <th style="width:70px">Age</th>
      <th style="width:90px">Salary</th>
      <th style="width:74px">Actions</th>
    </tr></thead>
    <tbody>${rows.map(a => `<tr>
      <td title="${a.company}">${a.link ? `<a href="${a.link}" target="_blank" style="color:var(--accent);text-decoration:none">${a.company}</a>` : a.company}</td>
      <td title="${a.role}">${a.role}</td>
      <td class="td-mono" title="${a.location||''}">${a.location||'—'}</td>
      <td>${statusBadge(a.status)}</td>
      <td>${priorityBadge(a.priority||'Low')}</td>
      <td class="td-mono">${a.date||'—'}</td>
      <td class="td-mono" style="${(daysAgo(a.date)||0)>30?'color:var(--amber)':''}">${daysLabel(a.date)}</td>
      <td class="td-mono">${a.salary||'—'}</td>
      <td><div style="display:flex;gap:4px">
        <button class="icon-btn" onclick="openDrawer(${a.id})" title="View details">◱</button>
        <button class="icon-btn" onclick="openModal(${a.id})" title="Edit">✎</button>
        <button class="icon-btn del" onclick="confirmDelete(${a.id})" title="Delete">✕</button>
      </div></td>
    </tr>`).join('')}
    </tbody></table></div>`;
}

function render() {
  renderStats();
  renderKPIs();
  if (view === 'kanban') renderKanban(); else renderTable();
}

// ─── VIEW TOGGLE ─────────────────────────────────────────────────────────────
function setView(v) {
  view = v;
  localStorage.setItem('jt_view', v);
  $('btn-kanban').classList.toggle('active', v === 'kanban');
  $('btn-table').classList.toggle('active', v === 'table');
  $('view-kanban').style.display = v === 'kanban' ? '' : 'none';
  $('view-table').style.display  = v === 'table'  ? '' : 'none';
  render();
}

// ─── DRAG & DROP ─────────────────────────────────────────────────────────────
function dragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function dragEnd() {
  document.querySelectorAll('.k-card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.k-col.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function dragOver(e, status) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  $(`col-${status}`).classList.add('drag-over');
}
function dragLeave(status) {
  $(`col-${status}`)?.classList.remove('drag-over');
}
async function drop(e, status) {
  e.preventDefault();
  dragLeave(status);
  if (!dragId) return;
  const id = dragId; dragId = null;
  const app = apps.find(a => a.id == id);
  if (!app || app.status === status) return;
  const oldStatus = app.status;
  // Optimistic update
  app.status = status;
  render();
  try {
    await api('PATCH', `/id/${id}`, { data: { status } });
    toast(`Moved to ${status}`, 'success');
  } catch(err) {
    app.status = oldStatus;
    render();
    toast('Failed to update status', 'error');
  }
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id) {
  editId = id || null;
  $('modal-title').textContent = id ? 'Edit Application' : 'Add Application';
  const saveBtn = $('save-btn');
  saveBtn.querySelector('.btn-text').textContent = id ? 'Save Changes' : 'Save Application';
  saveBtn.classList.remove('loading');
  const a = id ? apps.find(x => x.id == id) : {};
  FIELDS.forEach(f => { const el = $('f-'+f); if (el) el.value = (a && a[f]) || ''; });
  if (!id) {
    $('f-type').value = 'Full-time';
    $('f-status').value = 'Applied';
    $('f-priority').value = 'High';
    $('f-source').value = 'LinkedIn';
    $('f-date').value = new Date().toISOString().split('T')[0];
  }
  $('modal-overlay').classList.add('open');
  setTimeout(() => $('f-company').focus(), 120);
}
function closeModal() { $('modal-overlay').classList.remove('open'); }

async function saveApp() {
  const company = $('f-company').value.trim();
  const role    = $('f-role').value.trim();
  if (!company || !role) { toast('Company and Role are required', 'error'); return; }
  const data = {};
  FIELDS.forEach(f => { const el = $('f-'+f); data[f] = el ? el.value.trim() : ''; });
  const btn = $('save-btn');
  btn.classList.add('loading');
  btn.disabled = true;
  try {
    if (editId) {
      await api('PATCH', `/id/${editId}`, { data });
      Object.assign(apps.find(a => a.id == editId), data);
      toast('Application updated ✓');
    } else {
      data.id = Date.now();
      const res = await api('POST', '', { data });
      apps.push({ ...data, id: data.id });
      toast('Application added ✓');
    }
    closeModal();
    render();
  } catch(err) {
    toast('Failed to save — check your API', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ─── DELETE ──────────────────────────────────────────────────────────────────
function confirmDelete(id) {
  $('confirm-overlay').classList.add('open');
  confirmCallback = async () => {
    closeConfirm();
    try {
      await api('DELETE', `/id/${id}`);
      apps = apps.filter(a => a.id != id);
      render();
      toast('Application deleted', 'info');
    } catch(e) {
      toast('Failed to delete', 'error');
    }
  };
}
function closeConfirm() { $('confirm-overlay').classList.remove('open'); }
$('confirm-ok').addEventListener('click', () => confirmCallback && confirmCallback());

// ─── EXPORT CSV ──────────────────────────────────────────────────────────────
function exportCSV() {
  if (!apps.length) { toast('Nothing to export', 'info'); return; }
  const cols = ['id', ...FIELDS];
  const header = cols.join(',');
  const rows = apps.map(a => cols.map(c => `"${(a[c]||'').toString().replace(/"/g,'""')}"`).join(','));
  const blob = new Blob([header + '\n' + rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `job-applications-${new Date().toISOString().split('T')[0]}.csv`;
  link.click();
  URL.revokeObjectURL(url);
  toast(`Exported ${apps.length} applications`, 'success');
}

// ─── IMPORT CSV ──────────────────────────────────────────────────────────────
function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const lines = e.target.result.split('\n').filter(Boolean);
    const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim().toLowerCase());
    const imported = lines.slice(1).map(line => {
      const vals = line.match(/("([^"]*)"|[^,]*),?/g).map(v => v.replace(/^"|"$|,$/g,'').trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = vals[i] || '');
      return obj;
    }).filter(a => a.company && a.role);
    if (!imported.length) { toast('No valid rows found in CSV', 'error'); return; }
    toast(`Importing ${imported.length} rows…`, 'info');
    let ok = 0;
    for (const row of imported) {
      row.id = row.id || Date.now() + Math.random();
      try {
        await api('POST', '', { data: row });
        apps.push(row);
        ok++;
      } catch(_) {}
    }
    render();
    toast(`Imported ${ok} of ${imported.length} applications`, 'success');
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ─── JD DRAWER ───────────────────────────────────────────────────────────────
let drawerAppId = null, drawerTab = 'details', jdEditing = false;

function openDrawer(id) {
  drawerAppId = id;
  jdEditing = false;
  const a = apps.find(x => x.id == id);
  if (!a) return;
  $('dr-company').textContent = a.company;
  $('dr-role').textContent    = a.role;
  $('dr-badges').innerHTML    = `${statusBadge(a.status)} ${priorityBadge(a.priority||'Low')}`;
  setDrawerTab(drawerTab);
  $('drawer-overlay').classList.add('open');
}

function closeDrawer() {
  $('drawer-overlay').classList.remove('open');
  jdEditing = false;
  $('drawer-foot').style.display = 'none';
}

function setDrawerTab(tab) {
  drawerTab = tab;
  $('dtab-details').classList.toggle('active', tab === 'details');
  $('dtab-jd').classList.toggle('active',      tab === 'jd');
  if (tab === 'details') renderDrawerDetails();
  else renderDrawerJD();
}

function renderDrawerDetails() {
  const a = apps.find(x => x.id == drawerAppId);
  if (!a) return;
  $('drawer-foot').style.display = 'none';
  const row = (label, val, isLink) => val
    ? `<div class="drawer-row">
        <span class="drawer-row-label">${label}</span>
        <span class="drawer-row-val">${isLink ? `<a href="${val}" target="_blank">Open ↗</a>` : val}</span>
       </div>` : '';
  $('drawer-body').innerHTML = `
    <div class="drawer-section">
      <div class="drawer-section-title">Application Info</div>
      ${row('Location',    a.location)}
      ${row('Job Type',    a.type)}
      ${row('Source',      a.source)}
      ${row('Date Applied',a.date)}
      ${row('Days Since',  a.date ? daysLabel(a.date) : '')}
      ${row('Follow-up',   a.followup)}
      ${row('Salary',      a.salary)}
      ${row('Job Link',    a.link, true)}
    </div>
    <div class="drawer-section">
      <div class="drawer-section-title">Contact</div>
      ${row('Name',  a.contact)}
      ${row('Email', a.email ? `<a href="mailto:${a.email}">${a.email}</a>` : '')}
    </div>
    ${a.notes ? `<div class="drawer-section">
      <div class="drawer-section-title">Notes</div>
      <div class="drawer-notes">${a.notes}</div>
    </div>` : ''}
    <div style="margin-top:12px">
      <button class="btn btn-primary" style="width:100%" onclick="openModal(${a.id});closeDrawer()">✎ Edit Application</button>
    </div>`;
}

function renderDrawerJD(editMode) {
  const a = apps.find(x => x.id == drawerAppId);
  if (!a) return;
  if (editMode || jdEditing) {
    jdEditing = true;
    $('drawer-foot').style.display = 'flex';
    $('drawer-body').innerHTML = `
      <div style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:11px;color:var(--text3)">Paste or edit the job description below</span>
      </div>
      <textarea class="drawer-jd-edit" id="jd-textarea">${a.jd||''}</textarea>`;
    setTimeout(() => $('jd-textarea') && $('jd-textarea').focus(), 80);
  } else {
    $('drawer-foot').style.display = 'none';
    $('drawer-body').innerHTML = a.jd
      ? `<div class="drawer-jd-wrap">
          <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
            <button class="btn btn-sm" onclick="renderDrawerJD(true)">✎ Edit</button>
          </div>
          <div class="drawer-jd">${a.jd.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        </div>`
      : `<div class="drawer-jd-empty">
          <div style="font-size:28px;margin-bottom:10px">📄</div>
          <div style="font-weight:500;color:var(--text2);margin-bottom:6px">No job description yet</div>
          <div style="margin-bottom:16px">Paste the JD to keep everything in one place</div>
          <button class="btn btn-primary" onclick="renderDrawerJD(true)">+ Add Job Description</button>
        </div>`;
  }
}

function cancelJDEdit() {
  jdEditing = false;
  renderDrawerJD(false);
}

async function saveJD() {
  const jd = ($('jd-textarea') && $('jd-textarea').value) || '';
  const btn = $('save-jd-btn');
  btn.classList.add('loading'); btn.disabled = true;
  try {
    await api('PATCH', `/id/${drawerAppId}`, { data: { jd } });
    const a = apps.find(x => x.id == drawerAppId);
    if (a) a.jd = jd;
    jdEditing = false;
    renderDrawerJD(false);
    render();
    toast('Job description saved ✓');
  } catch(e) {
    toast('Failed to save JD', 'error');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeConfirm(); closeDrawer(); }
  if (e.key === 'n' && !$('modal-overlay').classList.contains('open') && !$('drawer-overlay').classList.contains('open')) openModal();
});

// ─── INIT ────────────────────────────────────────────────────────────────────
setView(view);
loadApps();
</script>
</body>
</html>
